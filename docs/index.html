<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1D9E75">
  <link rel="manifest" href="manifest.json">
  <title>SAP Gig Radar</title>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #f5f5f5;
      --color-sidebar-bg: #fafafa;
      --color-sidebar-active: #e6f4ef;
      --color-text: #1a1a1a;
      --color-text-muted: #666666;
      --color-border: #e0e0e0;
      --color-primary: #1D9E75;
      --color-score-high: #1D9E75;
      --color-score-mid: #d4930d;
      --color-badge-gulp: #0d9488;
      --color-badge-freelancermap: #7c3aed;
      --color-badge-linkedin: #2563eb;
      --color-badge-upwork: #16a34a;
      --color-badge-eursap: #ea580c;
      --color-badge-direct: #0891b2;
      --color-tag-bg: #e5e7eb;
      --color-tag-text: #4b5563;
      --color-offline-bg: #fef3c7;
      --color-offline-text: #92400e;
      --color-btn-bg: #e5e7eb;
      --color-btn-text: #374151;
      --sidebar-expanded: 240px;
      --sidebar-collapsed: 56px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #111111;
        --color-surface: #1e1e1e;
        --color-sidebar-bg: #161616;
        --color-sidebar-active: #1a3329;
        --color-text: #e5e5e5;
        --color-text-muted: #a3a3a3;
        --color-border: #333333;
        --color-tag-bg: #374151;
        --color-tag-text: #d1d5db;
        --color-offline-bg: #451a03;
        --color-offline-text: #fcd34d;
        --color-btn-bg: #374151;
        --color-btn-text: #d1d5db;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
    }

    /* ─── Offline banner ─────────────────────────────────────────── */
    .offline-banner {
      display: none;
      background: var(--color-offline-bg);
      color: var(--color-offline-text);
      text-align: center;
      padding: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .offline-banner.visible { display: block; }

    /* ─── Shell layout ───────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-expanded) 1fr;
      min-height: 100vh;
      transition: grid-template-columns 0.2s ease;
    }
    .shell.collapsed { grid-template-columns: var(--sidebar-collapsed) 1fr; }

    /* Mobile-only overlay backdrop — hidden on desktop so it doesn't
       occupy a grid track and push the sidebar into the wrong column. */
    .mobile-backdrop { display: none; }

    /* ─── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      background: var(--color-sidebar-bg);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--color-border);
      min-height: 56px;
    }

    .sidebar-toggle {
      background: transparent;
      border: none;
      color: var(--color-text);
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 18px;
      flex-shrink: 0;
    }
    .sidebar-toggle:hover { background: var(--color-surface); }

    .sidebar-brand {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--color-primary);
    }
    .shell.collapsed .sidebar-brand { display: none; }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-section {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      padding: 12px 16px 6px;
      white-space: nowrap;
      overflow: hidden;
    }
    .shell.collapsed .sidebar-section {
      padding: 12px 8px 6px;
      text-align: center;
      font-size: 0;
    }
    .shell.collapsed .sidebar-section::before {
      content: "•••";
      font-size: 14px;
      letter-spacing: 2px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      margin: 1px 6px;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      color: var(--color-text);
      background: transparent;
      border: none;
      width: calc(100% - 12px);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }
    .sidebar-item:hover { background: var(--color-surface); }
    .sidebar-item.active {
      background: var(--color-sidebar-active);
      color: var(--color-primary);
      font-weight: 600;
    }
    .sidebar-item input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .icon-square {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .icon-square.muted { background: var(--color-btn-bg); color: var(--color-btn-text); }

    .sidebar-item .label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-item .count {
      font-size: 12px;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
    }
    .sidebar-item.active .count { color: var(--color-primary); }

    .sidebar-item.domain-checked .icon-square::after {
      content: "✓";
      position: absolute;
      margin-left: -4px;
      background: var(--color-primary);
      color: #fff;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      font-size: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: translate(14px, -10px);
      border: 2px solid var(--color-sidebar-bg);
    }

    .shell.collapsed .sidebar-item .label,
    .shell.collapsed .sidebar-item .count {
      display: none;
    }
    .shell.collapsed .sidebar-item {
      justify-content: center;
      padding: 8px;
      margin: 1px 4px;
      width: calc(100% - 8px);
    }

    /* Tooltip for collapsed sidebar */
    .shell.collapsed .sidebar-item::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--color-text);
      color: var(--color-bg);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 100;
    }
    .shell.collapsed .sidebar-item:hover::after { opacity: 1; }

    .sidebar-footer {
      border-top: 1px solid var(--color-border);
      padding: 8px;
    }
    .sidebar-clear {
      width: 100%;
      background: transparent;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .sidebar-clear:hover:not(:disabled) { background: var(--color-surface); }
    .sidebar-clear:disabled { opacity: 0.4; cursor: not-allowed; }
    .shell.collapsed .sidebar-clear {
      font-size: 0;
      padding: 6px;
    }
    .shell.collapsed .sidebar-clear::before {
      content: "⟳";
      font-size: 16px;
    }

    /* ─── Main content ───────────────────────────────────────────── */
    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--color-border);
      gap: 16px;
      flex-wrap: wrap;
    }

    .main-header h1 { font-size: 20px; font-weight: 700; }
    .subtitle { font-size: 13px; color: var(--color-text-muted); margin-top: 2px; }

    .btn-refresh {
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-refresh:hover { opacity: 0.9; }

    .main-body {
      flex: 1;
      padding: 20px 24px;
      overflow: auto;
    }

    /* ─── Card grid ──────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      transition: transform 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover { transform: translateY(-2px); }

    .card-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .pill-source-gulp          { background: var(--color-badge-gulp); }
    .pill-source-freelancermap { background: var(--color-badge-freelancermap); }
    .pill-source-linkedin      { background: var(--color-badge-linkedin); }
    .pill-source-upwork        { background: var(--color-badge-upwork); }
    .pill-source-eursap        { background: var(--color-badge-eursap); }

    .pill-score-high { background: var(--color-score-high); }
    .pill-score-mid  { background: var(--color-score-mid); }

    .pill-direct {
      background: transparent;
      border: 1px solid var(--color-badge-direct);
      color: var(--color-badge-direct);
    }

    .card-meta { font-size: 13px; color: var(--color-text-muted); }
    .card-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }
    .card-date {
      font-size: 12px;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .card-date[title] { cursor: help; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      background: var(--color-tag-bg);
      color: var(--color-tag-text);
    }

    .btn-apply {
      display: inline-block;
      margin-top: auto;
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      text-align: center;
    }
    .btn-apply:hover { opacity: 0.9; }

    .empty-state {
      text-align: center;
      padding: 60px 16px;
      color: var(--color-text-muted);
      font-size: 16px;
    }

    .main-footer {
      border-top: 1px solid var(--color-border);
      padding: 12px 24px;
      font-size: 13px;
      color: var(--color-text-muted);
      text-align: center;
    }

    /* ─── Mobile: sidebar becomes overlay drawer ─────────────────── */
    @media (max-width: 700px) {
      .shell { grid-template-columns: 1fr; }
      .shell.collapsed { grid-template-columns: 1fr; }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: var(--sidebar-expanded);
        z-index: 20;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }
      .shell.mobile-open .sidebar { transform: translateX(0); }

      .mobile-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 19;
      }
      .shell.mobile-open .mobile-backdrop { display: block; }

      .main-header { padding: 12px 16px; }
      .main-body { padding: 16px; }

      .mobile-only { display: inline-flex !important; }
      .desktop-only { display: none !important; }
    }

    .mobile-only { display: none; }
  </style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">Showing cached report</div>

<div class="shell" id="shell">
  <div class="mobile-backdrop" id="mobileBackdrop"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
      <span class="sidebar-brand">Gig Radar</span>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <button class="sidebar-clear" id="btnClearDomains" disabled>Clear domains</button>
    </div>
  </aside>

  <main class="main">
    <header class="main-header">
      <button class="sidebar-toggle mobile-only" id="mobileMenuBtn" aria-label="Open menu">&#9776;</button>
      <div>
        <h1>SAP Gig Radar</h1>
        <div class="subtitle" id="subtitle">Last updated: Unknown</div>
      </div>
      <button class="btn-refresh" id="btnRefresh">Refresh</button>
    </header>

    <div class="main-body">
      <div id="cardGrid" class="card-grid"></div>
      <div id="emptyState" class="empty-state" style="display:none">No gigs match this filter</div>
    </div>

    <footer class="main-footer" id="footer"></footer>
  </main>
</div>

<script>
(function () {
  "use strict";

  let allListings = [];
  let activeFilter = "all";
  let activeDomains = new Set();
  let totalInFile = 0;
  let deadRemoved = 0;

  // Each filter is a quick-filter over all listings.
  const FILTERS = [
    { id: "all",      label: "All gigs",            icon: "ALL", color: "#6b7280" },
    { id: "top",      label: "Score 8+",            icon: "★",   color: "#1D9E75" },
    { id: "remote",   label: "Remote 100%",         icon: "⌂",   color: "#2563eb" },
    { id: "parttime", label: "Part-time (≤3 days)", icon: "⏱",   color: "#d4930d" },
  ];

  // Each domain matches if any tech_stack entry contains one of its keywords
  // (case-insensitive substring). Icon is a short abbreviation in a tinted tile.
  const DOMAINS = [
    { id: "sac",        label: "SAP Analytics Cloud", icon: "SAC", color: "#7c3aed", keywords: ["sac", "analytics cloud"] },
    { id: "bw",         label: "SAP BW / BW4HANA",    icon: "BW",  color: "#0d9488", keywords: ["bw"] },
    { id: "datasphere", label: "SAP Datasphere",      icon: "DS",  color: "#2563eb", keywords: ["datasphere"] },
    { id: "hana",       label: "SAP HANA",            icon: "HA",  color: "#ea580c", keywords: ["hana"] },
    { id: "s4",         label: "SAP S/4HANA",         icon: "S4",  color: "#4f46e5", keywords: ["s/4hana", "s4hana"] },
    { id: "fico",       label: "SAP FI / CO",         icon: "FI",  color: "#16a34a", keywords: ["fi/co", "fico", "sap fi", "sap co"] },
    { id: "mm",         label: "SAP MM",              icon: "MM",  color: "#b45309", keywords: ["sap mm"] },
    { id: "abap",       label: "SAP ABAP",            icon: "AB",  color: "#db2777", keywords: ["abap"] },
    { id: "btp",        label: "SAP BTP",             icon: "BTP", color: "#0891b2", keywords: ["btp"] },
    { id: "ai",         label: "AI / Joule / LLM",    icon: "AI",  color: "#dc2626", keywords: ["joule", "ai", "llm", "automation"] },
  ];

  const SIDEBAR_STATE_KEY = "gig-radar-sidebar-collapsed";

  const $ = (sel) => document.querySelector(sel);

  // ---- Service Worker ----
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  }

  // ---- Offline detection ----
  function updateOnlineStatus() {
    const banner = $("#offlineBanner");
    if (!navigator.onLine) banner.classList.add("visible");
    else banner.classList.remove("visible");
  }
  window.addEventListener("online", updateOnlineStatus);
  window.addEventListener("offline", updateOnlineStatus);
  updateOnlineStatus();

  // ---- Fetch data ----
  async function fetchData() {
    try {
      const resp = await fetch("./gigs_latest.json");
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      totalInFile = data.length;
      deadRemoved = data.filter((l) => l.status === "dead" || l.status === "expired").length;
      allListings = data.filter((l) => l.status === "live");
      updateSubtitle();
      buildSidebar();
      render();
    } catch (e) {
      allListings = [];
      totalInFile = 0;
      deadRemoved = 0;
      $("#subtitle").textContent = "Last updated: Failed to load data";
      buildSidebar();
      render();
    }
  }

  function updateSubtitle() {
    let ts = "Unknown";
    if (allListings.length > 0 && allListings[0].verified_at) {
      const d = new Date(allListings[0].verified_at);
      ts = d.toLocaleDateString() + " " + d.toLocaleTimeString();
    }
    $("#subtitle").textContent = "Last updated: " + ts;
  }

  // ---- Filtering ----
  function applyFilter(listings) {
    switch (activeFilter) {
      case "top":      return listings.filter((l) => l.score >= 8);
      case "remote":   return listings.filter((l) => l.remote_pct === 100);
      case "parttime": return listings.filter((l) => l.workload_days !== null && l.workload_days <= 3);
      default:         return listings;
    }
  }

  function listingMatchesDomain(listing, domain) {
    const stack = (listing.tech_stack || []).map((s) => String(s).toLowerCase());
    for (const kw of domain.keywords) {
      if (stack.some((s) => s.indexOf(kw) !== -1)) return true;
    }
    return false;
  }

  function applyDomainFilter(listings) {
    if (activeDomains.size === 0) return listings;
    const selected = DOMAINS.filter((d) => activeDomains.has(d.id));
    return listings.filter((l) => selected.some((d) => listingMatchesDomain(l, d)));
  }

  function countFilter(filterId) {
    const prev = activeFilter;
    activeFilter = filterId;
    const n = applyDomainFilter(applyFilter(allListings)).length;
    activeFilter = prev;
    return n;
  }

  function countDomain(domain) {
    return allListings.filter((l) => listingMatchesDomain(l, domain)).length;
  }

  // ---- Rendering ----
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function formatRelativeDate(isoStr) {
    if (!isoStr) return { short: "", full: "" };
    const d = new Date(isoStr);
    if (isNaN(d)) return { short: "", full: "" };
    const diffMs = Date.now() - d.getTime();
    const diffDays = Math.floor(diffMs / 86400000);
    const full = d.toLocaleDateString() + " " + d.toLocaleTimeString();
    let short;
    if (diffDays < 0)      short = d.toLocaleDateString();
    else if (diffDays === 0) short = "today";
    else if (diffDays === 1) short = "1d ago";
    else if (diffDays < 14)  short = diffDays + "d ago";
    else                     short = d.toLocaleDateString();
    return { short, full };
  }

  function renderCard(listing) {
    const scoreClass = listing.score >= 8 ? "pill-score-high" : "pill-score-mid";
    const sourceClass = "pill-source-" + listing.source;
    const days = listing.workload_days !== null ? listing.workload_days : "Flexible";
    const tags = (listing.tech_stack || []).slice(0, 3);

    const tagsHtml = tags.map((t) => '<span class="tag">' + escapeHtml(t) + '</span>').join("");
    const directBadge = listing.is_agency === false
      ? '<span class="pill pill-direct">Direct client</span>' : "";

    const dateInfo = formatRelativeDate(listing.scraped_at || listing.verified_at);
    const dateHtml = dateInfo.short
      ? '<span class="card-date" title="Found: ' + escapeHtml(dateInfo.full) + '">Found ' + escapeHtml(dateInfo.short) + '</span>'
      : '';

    return '<div class="card">' +
      '<div class="card-title">' + escapeHtml(listing.title) + '</div>' +
      '<div class="card-badges">' +
        '<span class="pill ' + sourceClass + '">' + escapeHtml(listing.source) + '</span>' +
        '<span class="pill ' + scoreClass + '">Score ' + listing.score + '</span>' +
        directBadge +
      '</div>' +
      '<div class="card-meta">Days/week: ' + days + '</div>' +
      '<div class="card-meta card-meta-row">' +
        '<span>Remote: ' + listing.remote_pct + '%</span>' +
        dateHtml +
      '</div>' +
      (tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : '') +
      '<a class="btn-apply" href="' + escapeHtml(listing.url) + '" target="_blank" rel="noopener">Apply &rarr;</a>' +
    '</div>';
  }

  function render() {
    const filtered = applyDomainFilter(applyFilter(allListings));
    const grid = $("#cardGrid");
    const empty = $("#emptyState");

    if (filtered.length === 0) {
      grid.innerHTML = "";
      empty.style.display = "block";
    } else {
      empty.style.display = "none";
      grid.innerHTML = filtered.map(renderCard).join("");
    }

    $("#footer").textContent =
      "Showing " + filtered.length + " of " + allListings.length +
      " live gigs (" + totalInFile + " total in file, " + deadRemoved + " dead removed)";
  }

  // ---- Sidebar ----
  function iconSquare(icon, color) {
    const bg = color ? ' style="background:' + color + '"' : ' class="icon-square muted"';
    return '<span class="icon-square"' + bg + '>' + escapeHtml(icon) + '</span>';
  }

  function buildSidebar() {
    let html = '<div class="sidebar-section">Filters</div>';
    for (const f of FILTERS) {
      const active = activeFilter === f.id ? " active" : "";
      html += '<button class="sidebar-item' + active + '" data-filter="' + f.id + '" data-tooltip="' + escapeHtml(f.label) + '">' +
        iconSquare(f.icon, f.color) +
        '<span class="label">' + escapeHtml(f.label) + '</span>' +
        '<span class="count">' + countFilter(f.id) + '</span>' +
      '</button>';
    }

    html += '<div class="sidebar-section">Domains</div>';
    for (const d of DOMAINS) {
      const checked = activeDomains.has(d.id);
      const cls = checked ? " domain-checked active" : "";
      html += '<label class="sidebar-item' + cls + '" data-tooltip="' + escapeHtml(d.label) + '">' +
        '<input type="checkbox" data-domain="' + d.id + '"' + (checked ? " checked" : "") + '>' +
        iconSquare(d.icon, d.color) +
        '<span class="label">' + escapeHtml(d.label) + '</span>' +
        '<span class="count">' + countDomain(d) + '</span>' +
      '</label>';
    }

    $("#sidebarNav").innerHTML = html;
    $("#btnClearDomains").disabled = activeDomains.size === 0;
  }

  // ---- Sidebar collapse state ----
  function applySidebarState() {
    const collapsed = localStorage.getItem(SIDEBAR_STATE_KEY) === "1";
    $("#shell").classList.toggle("collapsed", collapsed);
  }

  function toggleSidebar() {
    const shell = $("#shell");
    // Mobile: toggle drawer open/closed. Desktop: toggle collapsed rail.
    if (window.matchMedia("(max-width: 700px)").matches) {
      shell.classList.toggle("mobile-open");
      return;
    }
    const nowCollapsed = !shell.classList.contains("collapsed");
    shell.classList.toggle("collapsed", nowCollapsed);
    localStorage.setItem(SIDEBAR_STATE_KEY, nowCollapsed ? "1" : "0");
  }

  // ---- Event wiring ----
  $("#sidebarToggle").addEventListener("click", toggleSidebar);
  $("#mobileMenuBtn").addEventListener("click", toggleSidebar);
  $("#mobileBackdrop").addEventListener("click", () => {
    $("#shell").classList.remove("mobile-open");
  });

  $("#sidebarNav").addEventListener("click", (e) => {
    const filterBtn = e.target.closest("[data-filter]");
    if (filterBtn) {
      activeFilter = filterBtn.dataset.filter;
      buildSidebar();
      render();
      return;
    }
  });

  $("#sidebarNav").addEventListener("change", (e) => {
    const cb = e.target;
    if (cb.type !== "checkbox") return;
    const id = cb.dataset.domain;
    if (cb.checked) activeDomains.add(id); else activeDomains.delete(id);
    buildSidebar();
    render();
  });

  $("#btnClearDomains").addEventListener("click", () => {
    activeDomains.clear();
    buildSidebar();
    render();
  });

  $("#btnRefresh").addEventListener("click", fetchData);

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") $("#shell").classList.remove("mobile-open");
  });

  // ---- Init ----
  applySidebarState();
  fetchData();
  setInterval(fetchData, 60 * 60 * 1000);
})();
</script>
</body>
</html>
